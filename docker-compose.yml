x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: trialscope-technoverse-backend:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    - DATABASE_URL=postgresql://trialgo_user:trialgo_pass@postgres:5432/trialgo
    - REDIS_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/0
    - FRONTEND_URL=http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trialgo_user
      POSTGRES_PASSWORD: trialgo_pass
      POSTGRES_DB: trialgo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trialgo_user -d trialgo"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    <<: *backend-common
    ports:
      - "8000:8000"
    command: python start.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery_worker:
    <<: *backend-common
    command: celery -A tasks.celery_worker worker --loglevel=info --concurrency=2
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    <<: *backend-common
    command: celery -A tasks.celery_worker beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: trialscope-technoverse-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        INTERNAL_API_URL: http://backend:8000
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - INTERNAL_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis-data:
